name: Deploy to GitHub Pages

# Deploys the web app whenever a PR is merged into main (a merge produces a
# push to main). Also allows manual runs from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token: read the repo, publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-flight deploy; queue the next one instead.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        # GitHub Pages project sites are served from /<repo>/.
        run: pnpm -F web build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
